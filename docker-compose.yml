services:

  # ── YOLO Detection Service ────────────────────────────────────
  yolo-service:
    build: ./yolo-service
    container_name: firewatch-yolo
    restart: unless-stopped
    ports:
      - "8000:8000"

  # ── VLM Vision Service ─────────────────────────────────────
  vlm-service:
    build: ./vlm-service
    container_name: firewatch-vlm
    restart: unless-stopped
    ports:
      - "8019:8019"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

  # ── Streamlit Frontend ────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: firewatch-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - yolo-service
      - vlm-service
