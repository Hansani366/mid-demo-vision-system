events { worker_connections 1024; }

http {
    # HTTP → HTTPS redirect
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Allow frame uploads up to 10 MB
        client_max_body_size 10M;

        # Detection frames stay on the frontend proxy (→ YOLO / VLM).
        # Exact matches (=) beat the /api/ prefix, so only these two do.
        location = /api/detect {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }
        location = /api/describe {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 65s;
        }

        # Everything else under /api/ is the mobile app / event API → alert-service.
        # (Lets the browser dashboard POST /api/events/fire same-origin over HTTPS.)
        location /api/ {
            proxy_pass         http://alert-service:8090;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # The browser dashboard (static UI).
        location / {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 30s;
        }
    }
}