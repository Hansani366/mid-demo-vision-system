version: "3.9"

# ┌─────────────────────────────────────────────────────────────────┐
# │  VLM BACKEND SWITCH                                             │
# │  Change VLM_BACKEND below to swap between backends:            │
# │    gemini    → uses Gemini 2.5 Flash via Google API (fast)     │
# │    moondream → uses Moondream via local Ollama (private/offline)│
# └─────────────────────────────────────────────────────────────────┘

services:

  # ── YOLO Detection Service ────────────────────────────────────
  yolo-service:
    build: ./yolo-service
    container_name: firewatch-yolo
    restart: unless-stopped
    ports:
      - "8000:8000"
    # GPU support (optional - uncomment if you have an NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── VLM Service ───────────────────────────────────────────────
  vlm-service:
    build:
      context: ./vlm-service
      args:
        - VLM_BACKEND=gemini   # ← CHANGE HERE to switch (gemini | moondream)
    container_name: firewatch-vlm
    restart: unless-stopped
    ports:
      - "8019:8019"
    shm_size: '2gb'
    environment:
      # ▼▼▼ MUST MATCH the build arg above ▼▼▼
      - VLM_BACKEND=gemini     # options: gemini | moondream
      # ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

      # Required only when VLM_BACKEND=gemini (ignored for moondream)
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

      # Required only when VLM_BACKEND=moondream (ignored for gemini)
      - OLLAMA_URL=http://localhost:11434

  # ── Streamlit Frontend ────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: firewatch-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - yolo-service
      - vlm-service
    environment:
      - YOLO_SERVICE_URL=http://yolo-service:8000
      - VLM_SERVICE_URL=http://vlm-service:8019